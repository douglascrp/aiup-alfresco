services:
  content-app:
    build:
      context: ../..
      dockerfile: tests/deploy-tutorials/aca-extension/Dockerfile
    ports:
      - "4200:8080"
    environment:
      APP_CONFIG_ECM_HOST: "http://localhost:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
